<html lang="en">
<head>
<meta charset="utf-8">

<style>
:root{--bg:#0f1115;--card:#171a21;--card2:#1d212b;--line:#2a2f3a;--tx:#e5e9f0;--dim:#8b93a3;
--green:#4ade80;--red:#f87171;--amber:#fbbf24;--blue:#60a5fa;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--tx);font:16px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
padding-bottom:env(safe-area-inset-bottom)}
header{padding:16px 18px 10px;display:flex;align-items:baseline;justify-content:space-between}
header h1{font-size:19px;margin:0;font-weight:800;letter-spacing:.01em}
header .who{font-size:13px;color:var(--dim)}
header .who a{color:var(--blue);text-decoration:none}
.sectionnav{max-width:560px;margin:0 auto 12px;padding:0 14px;display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.sectionnav button{min-height:42px;border:1px solid var(--line);border-radius:10px;background:var(--card);color:var(--dim);font-weight:700;cursor:pointer}
.sectionnav button.on{background:rgba(96,165,250,.14);border-color:var(--blue);color:var(--blue)}
main{max-width:560px;margin:0 auto;padding:0 14px 40px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px}
.card h2{margin:0 0 10px;font-size:15px}
.statusband{border-radius:14px;padding:14px 16px;margin-bottom:14px;font-weight:700;display:flex;justify-content:space-between;align-items:center}
.statusband.alive{background:rgba(74,222,128,.12);border:1px solid rgba(74,222,128,.4);color:var(--green)}
.statusband.out{background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.4);color:var(--red)}
.statusband .sub{font-size:12px;font-weight:400;color:var(--dim)}
.pickedbanner{background:rgba(96,165,250,.1);border:1px solid rgba(96,165,250,.4);border-radius:12px;padding:12px 14px;margin-bottom:12px;font-size:14px}
.game{display:flex;gap:8px;margin-bottom:8px;align-items:stretch}
.game .at{align-self:center;color:var(--dim);font-size:12px;width:16px;text-align:center;flex:none}
.game .when{align-self:center;color:var(--dim);font-size:11px;width:92px;flex:none;text-align:right}
button.team{flex:1;background:var(--card2);border:1px solid var(--line);color:var(--tx);border-radius:10px;
padding:12px 8px;font-size:15px;font-weight:600;cursor:pointer;min-height:48px}
button.team.sel{background:rgba(74,222,128,.18);border-color:var(--green);color:var(--green)}
button.team.used{opacity:.35;text-decoration:line-through;cursor:not-allowed}
button.team.locked{opacity:.35;cursor:not-allowed}
button.team.mypick{outline:2px solid var(--blue)}
.submitbar{position:sticky;bottom:0;padding:10px 0 14px;background:linear-gradient(transparent, var(--bg) 30%)}
button.big{width:100%;background:var(--green);color:#08210f;border:none;border-radius:12px;padding:15px;font-size:16px;font-weight:800;cursor:pointer}
button.big:disabled{opacity:.4}
button.big.sec{background:var(--card2);color:var(--tx);border:1px solid var(--line)}
.namebtn{display:block;width:100%;text-align:left;background:var(--card2);border:1px solid var(--line);color:var(--tx);
border-radius:10px;padding:13px 14px;font-size:15px;margin-bottom:8px;cursor:pointer}
.namebtn.taken{opacity:.45}
.namebtn .tag{float:right;font-size:11px;color:var(--dim)}
input[type=text],input[type=email],input[type=tel]{width:100%;background:var(--card2);border:1px solid var(--line);color:var(--tx);border-radius:10px;padding:12px;font-size:16px;margin-bottom:10px}
.fieldlabel{display:block;font-size:13px;font-weight:700;margin:11px 0 5px}
.paybox{background:rgba(96,165,250,.08);border:1px solid rgba(96,165,250,.35);border-radius:12px;padding:14px;margin:14px 0}
.venmo{display:block;text-align:center;text-decoration:none;background:#3d95ce;color:white;border-radius:11px;padding:13px 12px;font-weight:800;margin:10px 0}
.checkrow{display:flex;gap:10px;align-items:flex-start;font-size:14px;margin:12px 0}
.checkrow input{width:20px;height:20px;flex:none;margin-top:1px}
.boardrow{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line)}
.boardrow:last-child{border-bottom:none}.boardrow .player{font-weight:650}.boardrow .pick{text-align:right;font-size:13px;color:var(--dim)}
.boardrow .pick.live{color:var(--green);font-weight:750}.boardtools{display:flex;gap:8px;align-items:center;margin:10px 0 4px}
.boardtools select{margin-left:auto;background:var(--card2);color:var(--tx);border:1px solid var(--line);border-radius:8px;padding:8px}
.mini{width:auto!important;padding:9px 12px!important;font-size:13px!important}
.hist{display:flex;flex-wrap:wrap;gap:6px}
.hist span{border-radius:8px;padding:5px 9px;font-size:12px;font-weight:600;background:var(--card2);border:1px solid var(--line)}
.hist span.W{background:rgba(74,222,128,.15);color:var(--green)}
.hist span.L,.hist span.T,.hist span.MISS{background:rgba(248,113,113,.15);color:var(--red)}
.standrow{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line);font-size:14px}
.standrow:last-child{border-bottom:none}
.standrow .st{font-size:12px;font-weight:700}
.standrow .st.alive{color:var(--green)} .standrow .st.out{color:var(--dim)}
.muted{color:var(--dim);font-size:13px}
.err{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.4);border-radius:10px;padding:12px;margin-bottom:12px;font-size:14px}
.ok{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.4);border-radius:10px;padding:12px;margin-bottom:12px;font-size:14px}
.count{font-variant-numeric:tabular-nums}
.potline{display:flex;justify-content:space-between;font-size:14px;padding:4px 0}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--card2);border:1px solid var(--green);
color:var(--tx);padding:10px 18px;border-radius:10px;display:none;z-index:50;font-size:14px;max-width:90vw}
.spin{text-align:center;padding:60px 0;color:var(--dim)}
footer{max-width:560px;margin:0 auto;padding:8px 18px 30px;color:var(--dim);font-size:11px}
</style>
</head>
<body>
<header>
  <h1>🏈 <span id="hName">Mehrle Survivor</span></h1>
  <div class="who" id="hWho"></div>
</header>
<nav class="sectionnav" id="sectionNav" aria-label="Pool sections"></nav>
<main id="app"><div class="spin">Loading…</div></main>
<footer id="foot"></footer>
<div id="toast"></div>
<script>
"use strict";
// ================= config =================
const SUPABASE_URL = "https://inbgusprbxtvmdpeqksn.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImluYmd1c3ByYnh0dm1kcGVxa3NuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyNTk2OTMsImV4cCI6MjA5OTgzNTY5M30.QUM68361lXHWqetmzA-LFOu6W33Goj-sZp5JwJUpZXs";
const DEMO = /(\?|&)demo=1/.test(location.search);
const VENMO_URL = 'https://venmo.com/u/Noah-Mehrle';

const TEAM_NAMES = {ARI:'Cardinals',ATL:'Falcons',BAL:'Ravens',BUF:'Bills',CAR:'Panthers',CHI:'Bears',
CIN:'Bengals',CLE:'Browns',DAL:'Cowboys',DEN:'Broncos',DET:'Lions',GB:'Packers',HOU:'Texans',IND:'Colts',
JAX:'Jaguars',KC:'Chiefs',LV:'Raiders',LAC:'Chargers',LAR:'Rams',MIA:'Dolphins',MIN:'Vikings',NE:'Patriots',
NO:'Saints',NYG:'Giants',NYJ:'Jets',PHI:'Eagles',PIT:'Steelers',SF:'49ers',SEA:'Seahawks',TB:'Buccaneers',
TEN:'Titans',WSH:'Commanders'};

// ================= state =================
let sb = null, session = null;
let db = { league:null, players:[], week:null, myPick:null, board:[], boardWeek:null };
let me = { pid: localStorage.getItem('survivor_pid') || null, player:null };
let sel = null;      // currently tapped team
const requestedScreen = new URLSearchParams(location.search).get('screen');
let view = ['join','home','board'].indexOf(requestedScreen) >= 0
  ? requestedScreen : (me.pid ? 'home' : 'join');
let boardSort = 'player';
let authMode = 'legacy_claim';
const pendingLoginEmail = sessionStorage.getItem('survivor_login_email') || '';
let loginState = {email:pendingLoginEmail, sent:!!pendingLoginEmail, busy:false, message:''};
let signupState = {busy:false, done:false, email:'', message:'', form:{name:'',email:'',phone:''}};

function esc(s){ return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg; el.style.display = 'block';
  clearTimeout(toast._t); toast._t = setTimeout(() => el.style.display = 'none', 3000);
}
function fmtKick(iso){
  const d = new Date(iso);
  return d.toLocaleString('en-US', {weekday:'short', month:'numeric', day:'numeric', hour:'numeric', minute:'2-digit', timeZoneName:'short'}).replace(/,/g, '');
}
function money(n){ return '$' + (+n || 0).toLocaleString(); }
function getSignupToken(){
  const yr = (db.league && db.league.config && db.league.config.seasonYear) || 'current';
  const key = 'survivor_signup_token_' + String(yr);
  let token = localStorage.getItem(key) || '';
  if (!/^[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i.test(token)){
    token = (window.crypto && window.crypto.randomUUID) ? window.crypto.randomUUID()
      : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
          const r = Math.random() * 16 | 0; return (c === 'x' ? r : (r & 3 | 8)).toString(16);
        });
    localStorage.setItem(key, token);
  }
  return token;
}

// ================= data =================
function isAnonymousSession(s){ return !!(s && s.user && (s.user.is_anonymous === true || !s.user.email)); }

async function loadBootstrap(){
  // Always bootstrap as the public anon role. A stored legacy/email session may be
  // authenticated but unmapped, so using the session-bound client can hide authMode.
  const r = await fetch(SUPABASE_URL + '/rest/v1/league?id=eq.1&select=config%2Cupdated_at', {
    cache:'no-store', headers:{apikey:SUPABASE_ANON_KEY, Authorization:'Bearer ' + SUPABASE_ANON_KEY}
  });
  if (!r.ok) throw new Error('Could not read the pool login settings.');
  const rows = await r.json();
  db.league = (rows && rows[0]) || {config:{}, state:{}};
  authMode = (db.league.config && db.league.config.authMode) || 'legacy_claim';
}

async function prepareSession(){
  const { data, error } = await sb.auth.getSession();
  if (error) throw error;
  session = data.session || null;
  if (authMode === 'email_otp'){
    if (isAnonymousSession(session)){
      await sb.auth.signOut();
      session = null;
    } else if (session){
      const mine = await sb.rpc('get_my_player');
      if (mine.error) throw mine.error;
      const mapped = Array.isArray(mine.data) ? mine.data[0] : mine.data;
      if (!mapped || !mapped.pid){
        loginState.email = (session.user && session.user.email) || loginState.email;
        loginState.sent = false;
        sessionStorage.removeItem('survivor_login_email');
        await sb.auth.signOut();
        session = null;
      }
    }
    me.pid = null; me.player = null; localStorage.removeItem('survivor_pid');
    return;
  }
  if (session && !isAnonymousSession(session)){
    await sb.auth.signOut();
    session = null;
  }
  if (!session){
    const { data: d2, error: e2 } = await sb.auth.signInAnonymously();
    if (e2) throw e2;
    session = d2.session;
  }
}

async function loadPickBoard(){
  db.board = []; db.boardWeek = null;
  if (!session) return;
  const { data, error } = await sb.rpc('get_pick_board', {p_week:null});
  if (error) throw error;
  db.board = Array.isArray(data) ? data : [];
  db.boardWeek = db.board.length ? db.board[0].board_week : null;
}

async function submitSignupRequest(name, email, phone, venmoSent){
  name = String(name || '').trim();
  email = String(email || '').trim().toLowerCase();
  phone = String(phone || '').trim();
  if (name.length < 2) throw new Error('Enter your full name.');
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) throw new Error('Enter a valid email address.');
  if (phone.replace(/\D/g, '').length < 10) throw new Error('Enter a valid mobile number.');
  if (!venmoSent) throw new Error('Confirm that you sent the Venmo entry fee.');
  signupState.form = {name, email, phone};
  signupState.busy = true; signupState.message = ''; render();
  if (DEMO){
    signupState = {busy:false, done:true, email, message:'', form:{name:'',email:'',phone:''}}; render(); return;
  }
  let temporarySession = false;
  if (!session){
    const { data, error } = await sb.auth.signInAnonymously();
    if (error) throw error;
    session = data.session; temporarySession = true;
  }
  const { error } = await sb.rpc('submit_signup_request', {
    p_name:name, p_email:email, p_phone:phone, p_venmo_sent:true, p_client_token:getSignupToken()
  });
  if (error){
    if (temporarySession){ try{ await sb.auth.signOut(); }catch(e){} session = null; }
    throw error;
  }
  signupState = {busy:false, done:true, email, message:'', form:{name:'',email:'',phone:''}};
  if (temporarySession){ try{ await sb.auth.signOut(); }catch(e){} session = null; }
  render();
}

async function loadAll(){
  let mapped = null;
  if (authMode === 'email_otp'){
    if (!session || isAnonymousSession(session)) throw new Error('Please sign in with your email code.');
    const mine = await sb.rpc('get_my_player');
    if (mine.error) throw mine.error;
    mapped = Array.isArray(mine.data) ? mine.data[0] : mine.data;
    if (!mapped || !mapped.pid) throw new Error('This signed-in email is not linked to an active pool account. Ask Noah to check the roster email.');
    me.pid = mapped.pid;
  }
  const playerColumns = authMode === 'email_otp'
    ? 'pid,name,alive,elim_week,used_teams'
    : 'pid,name,claim_uid,alive,elim_week,used_teams';
  const [lg, pl, wk] = await Promise.all([
    sb.from('league').select('config,state,updated_at').eq('id', 1).maybeSingle(),
    sb.from('players').select(playerColumns).order('name'),
    sb.from('weeks').select('week,kicks,games,first_kickoff').order('week'),
  ]);
  if (lg.error || pl.error || wk.error) throw (lg.error || pl.error || wk.error);
  db.league = lg.data || {config:{}, state:{}};
  db.players = pl.data || [];
  // pick week = first published week that still has a game in the future
  const now = Date.now();
  db.week = null;
  for (const w of (wk.data || [])){
    const kicks = w.kicks || {};
    if (Object.values(kicks).some(iso => new Date(iso).getTime() > now)){ db.week = w; break; }
  }
  me.player = me.pid ? db.players.find(p => p.pid === me.pid) : null;
  // device thinks it's someone, but the claim was reset or belongs to another uid -> back to claim
  if (authMode !== 'email_otp' && me.player && me.player.claim_uid && session && me.player.claim_uid !== session.user.id){
    me.player = null; me.pid = null; localStorage.removeItem('survivor_pid');
  }
  db.myPick = null;
  if (me.player && db.week){
    const { data, error } = await sb.from('picks').select('id,team,week,submitted_at')
      .eq('pid', me.pid).eq('week', db.week.week).maybeSingle();
    if (error) throw error;
    db.myPick = data || null;
  }
  await loadPickBoard();
}

async function sendLoginCode(email){
  email = String(email || '').trim().toLowerCase();
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) throw new Error('Enter a valid email address.');
  loginState.email = email;
  loginState.busy = true; loginState.message = ''; render();
  if (session){ await sb.auth.signOut(); session = null; }
  const { error } = await sb.auth.signInWithOtp({email, options:{shouldCreateUser:false}});
  loginState.busy = false;
  if (error) throw error;
  loginState.email = email; loginState.sent = true;
  sessionStorage.setItem('survivor_login_email', email);
  render();
}

async function verifyLoginCode(code){
  code = String(code || '').replace(/\D/g, '');
  if (!/^\d{6}$/.test(code)) throw new Error('Enter the 6-digit code from the email.');
  loginState.busy = true; loginState.message = ''; render();
  const { data, error } = await sb.auth.verifyOtp({email:loginState.email, token:code, type:'email'});
  if (error){ loginState.busy = false; throw error; }
  session = data.session;
  loginState = {email:'',sent:false,busy:false,message:''};
  sessionStorage.removeItem('survivor_login_email');
  await loadAll(); render();
}

async function signOutPlayer(){
  await sb.auth.signOut();
  session = null; me.pid = null; me.player = null; db.players = []; db.week = null; db.myPick = null;
  localStorage.removeItem('survivor_pid'); sessionStorage.removeItem('survivor_login_email');
  loginState = {email:'',sent:false,busy:false,message:''};
  await loadBootstrap();
  if (authMode !== 'email_otp') await prepareSession();
  render();
}

async function claim(pid){
  const { data, error } = await sb.rpc('claim_player', { p_pid: pid });
  if (error){ toast('Claim failed: ' + error.message); return; }
  if (data !== true){
    toast('That name is already claimed on another phone. If it’s really you, ask Noah to reset it.');
    return;
  }
  me.pid = pid; localStorage.setItem('survivor_pid', pid);
  view = 'home';
  await loadAll(); render();
  toast('Welcome, ' + (me.player ? me.player.name : pid) + '! 🎉');
}

async function submitPick(){
  if (!sel || !me.player || !db.week) return;
  const requested = sel;
  const wk = db.week.week;
  const id = me.pid + '_w' + wk;
  const btn = document.getElementById('submitBtn');
  if (btn) btn.disabled = true;
  let error = null;
  if (db.myPick){
    ({ error } = await sb.from('picks').update({ team: sel }).eq('id', id));
  } else {
    ({ error } = await sb.from('picks').insert({ id, pid: me.pid, week: wk, team: sel }));
    if (error && (error.code === '23505')){ // raced our own earlier insert
      ({ error } = await sb.from('picks').update({ team: sel }).eq('id', id));
    }
  }
  if (error){
    const msg = /row-level security/i.test(error.message)
      ? 'The league server refused this pick — the game may have kicked off, or you’ve already used that team.'
      : error.message;
    toast('❌ ' + msg);
    await loadAll(); render();
    return;
  }
  await loadAll();
  if (!db.myPick || db.myPick.team !== requested){
    sel = null;
    render();
    toast('❌ Pick was not changed — your original game may already have kicked off.');
    return;
  }
  sel = null;
  render();
  toast('✅ Locked in: ' + (TEAM_NAMES[db.myPick.team] || db.myPick.team) + ' — you can change it until kickoff');
}

// ================= demo mode =================
function loadDemo(){
  const t = h => new Date(Date.now() + h * 3600e3).toISOString();
  db.league = {config:{leagueName:'Mehrle Survivor (DEMO)', seasonYear:2026, entryFee:10},
    state:{pot:{entry:700, bb:0, total:700}, aliveCount:3, lastApplied:2,
      recap:'🏈 Demo recap — week 2 results…',
      players:{demo_you:{name:'Demo You', alive:true, picks:{1:{team:'DEN', outcome:'W'},2:{team:'ARI', outcome:'W'}}}}}};
  db.players = [
    {pid:'demo_you', name:'Demo You', claim_uid:'me', alive:true, used_teams:['DEN','ARI']},
    {pid:'demo_amy', name:'Amy (demo)', claim_uid:null, alive:true, used_teams:[]},
    {pid:'demo_joe', name:'Joe (demo)', claim_uid:null, alive:false, elim_week:2, used_teams:[]},
  ];
  db.week = {week:3, first_kickoff:t(2),
    games:[['CIN','CLE',t(2)],['DEN','KC',t(5)],['DAL','PHI',t(-1)],['BUF','MIA',t(26)]],
    kicks:{CIN:t(2), CLE:t(2), DEN:t(5), KC:t(5), DAL:t(-1), PHI:t(-1), BUF:t(26), MIA:t(26)}};
  me.pid = 'demo_you'; me.player = db.players[0];
  db.myPick = null;
  db.boardWeek = 3;
  db.board = [
    {board_week:3,pid:'demo_you',player_name:'Demo You',alive:true,team:null,pick_status:'hidden',is_self:true},
    {board_week:3,pid:'demo_amy',player_name:'Amy (demo)',alive:true,team:'DAL',pick_status:'revealed',is_self:false},
    {board_week:3,pid:'demo_joe',player_name:'Joe (demo)',alive:false,elim_week:2,team:null,pick_status:'out',is_self:false},
  ];
  session = {user:{id:'me'}};
  if (!requestedScreen) view = 'home';
}

// ================= render =================
function render(){
  const app = document.getElementById('app');
  const cfg = (db.league && db.league.config) || {};
  document.getElementById('hName').textContent = cfg.leagueName || 'Mehrle Survivor';
  document.title = cfg.leagueName || 'Mehrle Survivor';
  const who = document.getElementById('hWho');
  who.innerHTML = me.player ? esc(me.player.name) + ' · <a href="#" id="' + (authMode === 'email_otp' ? 'signOutLink' : 'switchLink') + '">'
    + (authMode === 'email_otp' ? 'sign out' : 'switch') + '</a>' : '';
  document.getElementById('foot').textContent = DEMO ? 'DEMO MODE — nothing is saved' :
    'Picks lock at each game’s kickoff. Problems? Text Noah.';

  renderSectionNav();
  if (view === 'join'){ app.innerHTML = renderSignup(); wire(); return; }
  if (view === 'board'){ app.innerHTML = renderPickBoard(); wire(); return; }

  if (!me.player){ app.innerHTML = authMode === 'email_otp' ? renderLogin() : renderClaim(); wire(); return; }

  let h = '';
  const st = (db.league && db.league.state) || {};
  const meState = (st.players || {})[me.pid] || {};
  const alive = me.player.alive;
  let outSub = 'Your entry is eliminated.';
  if (!alive && meState.buybackEligible){
    outSub = 'One buyback is available: ' + money(meState.buybackPrice) + ' to re-enter Week ' + meState.buybackReentryWeek
      + '. Pay/contact Noah; earlier teams stay used.';
  } else if (!alive && meState.buybackUsed){
    outSub = 'Your one buyback was already used, so this loss is final.';
  } else if (!alive && me.player.elim_week > 5){
    outSub = 'Buybacks are only available after losses in Weeks 1–5.';
  }
  h += '<div class="statusband ' + (alive ? 'alive' : 'out') + '"><div>' +
    (alive ? '💚 You’re ALIVE' : '💀 You’re OUT' + (me.player.elim_week ? ' — week ' + me.player.elim_week : '')) +
    '<div class="sub">' + (alive
      ? esc((st.aliveCount != null ? st.aliveCount + ' of ' + db.players.length + ' still standing' : ''))
      : esc(outSub)) + '</div></div>' +
    (st.pot ? '<div style="text-align:right">' + money(st.pot.total) + '<div class="sub">pot</div></div>' : '') + '</div>';

  if (alive) h += renderPickCard();
  h += renderHistory(meState);
  h += renderLeague(st);
  app.innerHTML = h;
  wire();
}

function renderSectionNav(){
  const items = [['join','Join'],['home','My Pick'],['board','League Picks']];
  document.getElementById('sectionNav').innerHTML = items.map(x =>
    '<button type="button" class="navbtn' + (view === x[0] ? ' on' : '') + '" data-view="' + x[0] + '">' + x[1] + '</button>'
  ).join('');
}

function renderSignup(){
  const cfg = (db.league && db.league.config) || {};
  const fee = cfg.entryFee != null ? +cfg.entryFee : 10;
  if (signupState.done){
    return '<div class="card"><div class="ok"><b>Entry received.</b><br>Noah will review your information and verify the Venmo payment.</div>'
      + '<h2>What happens next</h2><p class="muted">Your payment checkbox is a confirmation from you—not an automatic payment check. '
      + 'Once Noah adds and approves you, use <b>My Pick</b> to claim or sign in to your account.</p>'
      + '<button type="button" class="big sec" id="afterSignupMyPick">Go to My Pick</button></div>';
  }
  const f = signupState.form || {};
  let h = '<div class="card"><h2>Join ' + esc(cfg.leagueName || 'Mehrle Survivor') + '</h2>'
    + '<p class="muted">Enter your own contact information so Noah can add you to the pool and reach you about picks.</p>';
  if (signupState.message) h += '<div class="err">' + esc(signupState.message) + '</div>';
  h += '<form id="signupForm">'
    + '<label class="fieldlabel" for="signupName">Full name</label>'
    + '<input type="text" id="signupName" value="' + esc(f.name || '') + '" autocomplete="name" maxlength="80" placeholder="First and last name" required>'
    + '<label class="fieldlabel" for="signupEmail">Email</label>'
    + '<input type="email" id="signupEmail" value="' + esc(f.email || '') + '" autocomplete="email" maxlength="254" placeholder="you@example.com" required>'
    + '<label class="fieldlabel" for="signupPhone">Mobile phone</label>'
    + '<input type="tel" id="signupPhone" value="' + esc(f.phone || '') + '" autocomplete="tel" inputmode="tel" maxlength="30" placeholder="(513) 555-0123" required>'
    + '<p class="muted">Your email and phone stay private and are only shown to Noah.</p>'
    + '<div class="paybox"><b>Entry fee: ' + money(fee) + '</b><br><span class="muted">Send it to <b>@Noah-Mehrle</b> and put your full name in the Venmo note.</span>'
    + '<a class="venmo" href="' + esc(VENMO_URL) + '" target="_blank" rel="noopener">Open Venmo @Noah-Mehrle</a>'
    + '<label class="checkrow"><input type="checkbox" id="venmoSent" required><span><b>I confirm I sent the ' + money(fee) + ' entry fee to @Noah-Mehrle.</b><br>'
    + '<span class="muted">Noah will still verify the payment before marking you paid.</span></span></label></div>'
    + '<button type="submit" class="big"' + (signupState.busy ? ' disabled' : '') + '>' + (signupState.busy ? 'Sending…' : 'Send my entry') + '</button></form></div>';
  return h;
}

function renderPickBoard(){
  if (!me.player){
    return '<div class="card"><h2>League picks</h2><p class="muted">The pick board is private to pool members. Open <b>My Pick</b> and claim your name or sign in first.</p>'
      + '<button type="button" class="big sec" id="goMyPick">Go to My Pick</button></div>';
  }
  if (!db.board.length){
    return '<div class="card"><h2>League picks</h2><p class="muted">There isn’t a published pick week yet. Check back after Noah publishes the schedule.</p>'
      + '<button type="button" class="big sec mini" id="boardRefresh">Refresh</button></div>';
  }
  const rows = db.board.slice().sort((a,b) => {
    if (boardSort === 'team'){
      const at = a.team ? (TEAM_NAMES[a.team] || a.team) : 'zzzz';
      const bt = b.team ? (TEAM_NAMES[b.team] || b.team) : 'zzzz';
      const byTeam = at.localeCompare(bt);
      if (byTeam) return byTeam;
    }
    return String(a.player_name || '').localeCompare(String(b.player_name || ''));
  });
  let h = '<div class="card"><h2>Week ' + esc(db.boardWeek) + ' league picks</h2>'
    + '<p class="muted">Other people’s picks unlock only when <b>that team’s game starts</b>. Before kickoff, a saved pick and no pick look exactly the same.</p>'
    + '<div class="boardtools"><button type="button" class="big sec mini" id="boardRefresh">Refresh</button>'
    + '<label class="muted" for="boardSort">Sort</label><select id="boardSort"><option value="player"' + (boardSort === 'player' ? ' selected' : '') + '>Player</option>'
    + '<option value="team"' + (boardSort === 'team' ? ' selected' : '') + '>Revealed team</option></select></div>';
  for (const r of rows){
    let pick = 'Hidden until kickoff', cls = '';
    const ownCurrentPick = r.is_self && db.week && db.week.week === r.board_week && db.myPick;
    if (r.pick_status === 'revealed' && r.team){ pick = (TEAM_NAMES[r.team] || r.team) + ' (' + r.team + ')'; cls = ' live'; }
    else if (ownCurrentPick){ pick = 'Your pick: ' + (TEAM_NAMES[db.myPick.team] || db.myPick.team); cls = ' live'; }
    else if (r.pick_status === 'missing') pick = 'No pick';
    else if (r.pick_status === 'out') pick = 'Out' + (r.elim_week ? ' — week ' + r.elim_week : '');
    h += '<div class="boardrow"><span class="player">' + esc(r.player_name) + (r.is_self ? ' <span class="muted">(you)</span>' : '') + '</span>'
      + '<span class="pick' + cls + '">' + esc(pick) + '</span></div>';
  }
  return h + '</div>';
}

function renderLogin(){
  const email = esc(loginState.email || '');
  let h = '<div class="card"><h2>Sign in to your pool account</h2>';
  if (loginState.message) h += '<div class="' + (loginState.message.indexOf('sent') >= 0 ? 'ok' : 'err') + '">' + esc(loginState.message) + '</div>';
  if (!loginState.sent){
    h += '<p class="muted">Use the email Noah has for you. We’ll send a private 6-digit sign-in code—no password to remember.</p>'
      + '<form id="emailLoginForm"><input type="email" id="loginEmail" value="' + email + '" placeholder="you@example.com" autocomplete="email" required>'
      + '<button type="submit" class="big"' + (loginState.busy ? ' disabled' : '') + '>' + (loginState.busy ? 'Sending…' : 'Send my code') + '</button></form>';
  } else {
    h += '<div class="ok">Code sent. Check your inbox and spam folder.</div>'
      + '<p class="muted">Enter the 6-digit code sent to <b>' + email + '</b>.</p>'
      + '<form id="codeLoginForm"><input type="tel" id="loginCode" inputmode="numeric" autocomplete="one-time-code" pattern="[0-9]{6}" maxlength="6" placeholder="123456" required>'
      + '<button type="submit" class="big"' + (loginState.busy ? ' disabled' : '') + '>' + (loginState.busy ? 'Checking…' : 'Sign in') + '</button></form>'
      + '<button type="button" class="big sec" id="changeEmailBtn" style="margin-top:10px">Use a different email</button>';
  }
  return h + '<p class="muted" style="margin-top:12px">Not receiving a code? Confirm the roster email with Noah.</p></div>';
}

function renderClaim(){
  let h = '<div class="card"><h2>Who are you?</h2>';
  if (!db.players.length){
    h += '<p class="muted">The roster hasn’t been published yet — check back soon, or text Noah.</p></div>';
    return h;
  }
  h += '<p class="muted">Tap your name to claim it on this phone. One phone per person — if you switch phones, Noah can reset you.</p>' +
    '<input type="text" id="nameFilter" placeholder="Search your name…" autocomplete="off">' +
    '<div id="nameList">';
  for (const p of db.players){
    const takenByOther = p.claim_uid && (!session || p.claim_uid !== session.user.id);
    h += '<button type="button" class="namebtn' + (takenByOther ? ' taken' : '') + '" data-pid="' + esc(p.pid) + '"' +
      (takenByOther ? ' data-taken="1"' : '') + '>' + esc(p.name) +
      '<span class="tag">' + (takenByOther ? 'claimed' : (p.alive ? '' : 'out wk' + (p.elim_week || '?'))) + '</span></button>';
  }
  h += '</div></div>';
  return h;
}

function renderPickCard(){
  if (!db.week){
    return '<div class="card"><h2>This week</h2><p class="muted">No week is open for picks yet — Noah publishes the schedule after grading. Check back soon.</p></div>';
  }
  const wk = db.week, now = Date.now();
  const used = new Set(me.player.used_teams || []);
  const pickKicked = !!(db.myPick && wk.kicks[db.myPick.team] && new Date(wk.kicks[db.myPick.team]).getTime() <= now);
  let h = '<div class="card"><h2>Week ' + wk.week + ' — pick your winner</h2>';
  if (db.myPick){
    h += '<div class="pickedbanner">Your pick: <b>' + esc(TEAM_NAMES[db.myPick.team] || db.myPick.team) + '</b>' +
      (pickKicked ? ' — locked (your game started) 🔒' : ' — tap another team to change it before kickoff') + '</div>';
  } else {
    h += '<div class="err">⏰ No pick yet! If you don’t pick before the games, you’re out.</div>';
  }
  const games = (wk.games && wk.games.length) ? wk.games : Object.keys(wk.kicks || {}).sort().map(t => [t, null, wk.kicks[t]]);
  for (const g of games){
    const [away, home, iso] = g;
    const kicked = new Date(iso).getTime() <= now;
    h += '<div class="game">';
    h += teamBtn(away, used, kicked, pickKicked);
    h += '<span class="at">@</span>';
    h += home ? teamBtn(home, used, kicked, pickKicked) : '';
    h += '<span class="when">' + (kicked ? 'started' : esc(fmtKick(iso))) + '</span>';
    h += '</div>';
  }
  h += '<div class="submitbar"><button type="button" class="big" id="submitBtn"' + (sel ? '' : ' disabled') + '>' +
    (sel ? (db.myPick ? 'Change pick to ' : 'Lock in ') + (TEAM_NAMES[sel] || sel) : (db.myPick ? 'Tap a team to change your pick' : 'Tap a team above')) +
    '</button></div>';
  h += '<p class="muted">Teams you’ve already used are crossed out. Games that started are locked. The server enforces all of this — no take-backs after kickoff.</p></div>';
  return h;
}

function teamBtn(abbr, used, kicked, pickKicked){
  if (!abbr) return '';
  const isSel = sel === abbr;
  const isMine = db.myPick && db.myPick.team === abbr;
  let cls = 'team';
  if (isSel) cls += ' sel';
  if (used.has(abbr)) cls += ' used';
  else if (kicked || pickKicked) cls += ' locked';
  if (isMine) cls += ' mypick';
  const dis = used.has(abbr) || kicked || pickKicked;
  return '<button type="button" class="' + cls + '" data-team="' + esc(abbr) + '"' +
    (dis ? ' data-dis="1" aria-disabled="true"' : '') + (pickKicked ? ' data-pick-locked="1"' : '') + '>' +
    esc(TEAM_NAMES[abbr] || abbr) + (isMine ? ' ✓' : '') + '</button>';
}

function renderHistory(meState){
  const picks = meState.picks || {};
  const weeks = Object.keys(picks).map(Number).sort((a,b) => a - b);
  if (!weeks.length) return '';
  let h = '<div class="card"><h2>Your season</h2><div class="hist">';
  for (const w of weeks){
    const p = picks[w];
    h += '<span class="' + esc(p.outcome || '') + '">W' + w + ' ' + esc(TEAM_NAMES[p.team] || p.team || '—') + '</span>';
  }
  h += '</div></div>';
  return h;
}

function renderLeague(st){
  let h = '<div class="card"><h2>The league</h2>';
  if (st.pot){
    h += '<div class="potline"><span>Pot</span><b>' + money(st.pot.total) + '</b></div>' +
      '<div class="potline muted"><span>' + money(st.pot.entry) + ' entries + ' + money(st.pot.bb) + ' buybacks</span>' +
      '<span class="count">' + (st.aliveCount != null ? st.aliveCount + ' alive' : '') + '</span></div>';
  }
  if (st.recap) h += '<details style="margin:8px 0"><summary class="muted" style="cursor:pointer">Last week’s recap</summary><pre style="white-space:pre-wrap;font:12px/1.5 ui-monospace,Menlo,monospace;color:var(--dim)">' + esc(st.recap) + '</pre></details>';
  const rows = db.players.map(p => '<div class="standrow"><span>' + esc(p.name) + '</span><span class="st ' +
    (p.alive ? 'alive">ALIVE' : 'out">OUT' + (p.elim_week ? ' wk' + p.elim_week : '')) + '</span></div>').join('');
  h += '<details><summary class="muted" style="cursor:pointer">Everyone (' + db.players.length + ')</summary>' + rows + '</details>';
  h += '</div>';
  return h;
}

// ================= events =================
function wire(){
  document.querySelectorAll('.navbtn').forEach(b => b.onclick = async () => {
    view = b.dataset.view;
    if (view === 'board' && me.player && !DEMO){
      try{ await loadPickBoard(); }catch(err){ toast('Couldn’t refresh league picks: ' + (err.message || err)); }
    }
    render();
  });
  const signupForm = document.getElementById('signupForm');
  if (signupForm) signupForm.onsubmit = e => {
    e.preventDefault();
    submitSignupRequest(
      document.getElementById('signupName').value,
      document.getElementById('signupEmail').value,
      document.getElementById('signupPhone').value,
      document.getElementById('venmoSent').checked
    ).catch(err => {
      signupState.busy = false;
      const msg = String(err && err.message || '');
      signupState.message = /^(Enter|Confirm)/.test(msg)
        ? msg : 'Your entry could not be sent. Check your connection and try again, or text Noah.';
      render();
    });
  };
  const afterSignupMyPick = document.getElementById('afterSignupMyPick');
  if (afterSignupMyPick) afterSignupMyPick.onclick = () => { view = 'home'; render(); };
  const goMyPick = document.getElementById('goMyPick');
  if (goMyPick) goMyPick.onclick = () => { view = 'home'; render(); };
  const boardRefresh = document.getElementById('boardRefresh');
  if (boardRefresh) boardRefresh.onclick = async () => {
    boardRefresh.disabled = true;
    try{ if (!DEMO) await loadPickBoard(); toast('League picks refreshed'); }
    catch(err){ toast('Couldn’t refresh league picks: ' + (err.message || err)); }
    render();
  };
  const boardSortEl = document.getElementById('boardSort');
  if (boardSortEl) boardSortEl.onchange = () => { boardSort = boardSortEl.value; render(); };
  const so = document.getElementById('signOutLink');
  if (so) so.onclick = e => {
    e.preventDefault();
    signOutPlayer().catch(err => toast('Couldn’t sign out: ' + (err.message || err)));
  };
  const emailForm = document.getElementById('emailLoginForm');
  if (emailForm) emailForm.onsubmit = e => {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value;
    sendLoginCode(email).catch(err => {
      loginState.busy = false;
      loginState.message = /valid email/i.test(err.message || '') ? err.message
        : (/429|rate limit/i.test(err.message || '') ? 'Too many codes were requested. Wait a few minutes and try again.'
          : 'A code could not be sent. Confirm this is the roster email or ask Noah for help.');
      render();
    });
  };
  const codeForm = document.getElementById('codeLoginForm');
  if (codeForm) codeForm.onsubmit = e => {
    e.preventDefault();
    verifyLoginCode(document.getElementById('loginCode').value).catch(async err => {
      loginState.busy = false;
      loginState.message = /linked to an active pool account/i.test(err.message || '')
        ? err.message : 'That code is invalid or expired. Request a new one and try again.';
      if (/linked to an active pool account/i.test(err.message || '')){ try{ await sb.auth.signOut(); session = null; }catch(e2){} }
      render();
    });
  };
  const changeEmail = document.getElementById('changeEmailBtn');
  if (changeEmail) changeEmail.onclick = () => {
    loginState.sent = false; loginState.busy = false; loginState.message = '';
    sessionStorage.removeItem('survivor_login_email'); render();
  };
  const sw = document.getElementById('switchLink');
  if (sw) sw.onclick = e => {
    e.preventDefault();
    if (!confirm('Switch player? (Your claim stays yours — this just lets you look at the claim screen.)')) return;
    me.pid = null; me.player = null; localStorage.removeItem('survivor_pid');
    render();
  };
  const filter = document.getElementById('nameFilter');
  if (filter) filter.oninput = () => {
    const q = filter.value.toLowerCase();
    document.querySelectorAll('#nameList .namebtn').forEach(b => {
      b.style.display = b.textContent.toLowerCase().indexOf(q) >= 0 ? '' : 'none';
    });
  };
  document.querySelectorAll('.namebtn').forEach(b => b.onclick = () => {
    if (b.dataset.taken){ toast('Already claimed on another phone — ask Noah to reset it if that’s you.'); return; }
    if (!confirm('Claim "' + b.textContent.replace(/claimed|out wk\d*/,'').trim() + '" as YOU on this phone?')) return;
    if (DEMO){ toast('Demo mode — claiming disabled'); return; }
    claim(b.dataset.pid).catch(err => toast('Claim failed: ' + (err.message || err)));
  });
  document.querySelectorAll('button.team').forEach(b => b.onclick = () => {
    if (b.dataset.dis){
      toast(b.classList.contains('used') ? 'You already used that team this season' :
        (b.dataset.pickLocked ? 'Your pick is locked because its game already started' : 'That game already kicked off'));
      return;
    }
    sel = (sel === b.dataset.team) ? null : b.dataset.team;
    render();
  });
  const sub = document.getElementById('submitBtn');
  if (sub) sub.onclick = () => {
    if (DEMO){ db.myPick = {team: sel}; me.player.used_teams; sel = null; render(); toast('✅ (demo) pick saved'); return; }
    submitPick().catch(async err => {
      try{ await loadAll(); }catch(e){}
      sel = null; render();
      toast('❌ Couldn’t save the pick: ' + (err.message || err));
    });
  };
}

// ================= boot =================
(async function(){
  try{
    if (DEMO){ loadDemo(); render(); return; }
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    await loadBootstrap();
    await prepareSession();
    if (authMode === 'email_otp' && !session){ render(); }
    else await loadAll();
    render();
    sb.auth.onAuthStateChange((event, newSession) => {
      session = newSession;
      if (authMode === 'email_otp' && event === 'SIGNED_OUT'){
        me.pid = null; me.player = null; db.players = []; db.week = null; db.myPick = null;
        setTimeout(render, 0);
      }
    });
    // refresh data when the app comes back to foreground (phones)
    document.addEventListener('visibilitychange', async () => {
      if (!document.hidden && (authMode !== 'email_otp' || session)){ try{ await loadAll(); render(); }catch(e){} }
    });
    // Time passing does not emit a database event, so refresh the open board once
    // a minute to reveal games that have just kicked off.
    setInterval(async () => {
      if (view === 'board' && me.player && !document.hidden){
        try{ await loadPickBoard(); render(); }catch(e){}
      }
    }, 60000);
  }catch(err){
    document.getElementById('app').innerHTML =
      '<div class="err">Couldn’t load the league (' + esc(err.message || err) + ').<br>Check your connection and pull to refresh — or text Noah.</div>';
  }
})();
</script>
</body>
</html>
